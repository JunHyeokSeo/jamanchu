<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('채팅')}"></head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

  <!-- Chat top bar -->
  <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-700/50">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center gap-3">
      <a href="/matches" class="text-slate-400 hover:text-white transition-colors duration-200 text-xl leading-none">←</a>
      <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-pink-500 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0"
           th:text="${partnerNickname != null ? partnerNickname.substring(0,1) : '?'}">?</div>
      <div class="flex-1 min-w-0">
        <p class="font-bold text-white text-sm leading-tight truncate" th:text="${partnerNickname}">파트너</p>
        <p class="text-xs text-violet-400 font-medium">취향 메이트</p>
      </div>
    </div>
  </header>

  <!-- Messages area -->
  <main class="flex-1 overflow-y-auto max-w-2xl w-full mx-auto px-4 py-4 flex flex-col gap-2"
        id="messages-container"
        role="log"
        aria-live="polite"
        aria-label="채팅 메시지">

    <div th:if="${messages == null or messages.isEmpty()}"
         id="empty-chat-state"
         class="flex-1 flex flex-col items-center justify-center py-16 text-center gap-3">
      <div class="w-16 h-16 bg-slate-800 border border-slate-700/60 rounded-2xl flex items-center justify-center text-3xl mb-1" aria-hidden="true">💬</div>
      <p class="text-slate-300 font-semibold text-base">첫 대화를 시작해보세요!</p>
      <p class="text-slate-500 text-sm max-w-xs leading-relaxed">
        <span th:text="${partnerNickname}">파트너</span>님과 공통 취향 이야기를 나눠보세요
      </p>
      <div class="flex gap-2 mt-2 flex-wrap justify-center">
        <span class="px-3 py-1.5 bg-slate-800/80 border border-slate-700/50 rounded-full text-slate-400 text-xs">안녕하세요 👋</span>
        <span class="px-3 py-1.5 bg-slate-800/80 border border-slate-700/50 rounded-full text-slate-400 text-xs">취향이 비슷하네요 ✨</span>
        <span class="px-3 py-1.5 bg-slate-800/80 border border-slate-700/50 rounded-full text-slate-400 text-xs">반가워요 💜</span>
      </div>
    </div>

    <div th:each="msg : ${messages}"
         th:attr="data-msg-id=${msg.id}"
         th:classappend="${msg.sender != null and currentUser != null and msg.sender.id == currentUser.id} ? 'justify-end' : 'justify-start'"
         class="flex items-end gap-2 message-row">

      <!-- Avatar for partner -->
      <div th:if="${msg.sender == null or currentUser == null or msg.sender.id != currentUser.id}"
           class="w-7 h-7 bg-gradient-to-br from-violet-500 to-pink-500 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 mb-1"
           th:text="${partnerNickname != null ? partnerNickname.substring(0,1) : '?'}">?</div>

      <div th:classappend="${msg.sender != null and currentUser != null and msg.sender.id == currentUser.id} ? 'items-end' : 'items-start'"
           class="flex flex-col gap-1 max-w-[75%]">
        <div th:classappend="${msg.sender != null and currentUser != null and msg.sender.id == currentUser.id} ? 'bg-violet-600 text-white rounded-2xl rounded-br-md' : 'bg-slate-700 text-slate-100 rounded-2xl rounded-bl-md'"
             class="px-4 py-2.5 text-sm leading-relaxed break-words shadow-sm"
             th:text="${msg.content}">메시지</div>
        <time class="text-slate-500 text-xs px-1"
              th:attr="data-time=${msg.createdAt}"></time>
      </div>

      <!-- Spacer for own messages -->
      <div th:if="${msg.sender != null and currentUser != null and msg.sender.id == currentUser.id}"
           class="w-7 flex-shrink-0"></div>
    </div>

  </main>

  <!-- Message input -->
  <div class="sticky bottom-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-700/50">
    <div class="max-w-2xl mx-auto px-4 py-3">
      <form th:action="@{/chat/{matchId}/send(matchId=${matchId})}" method="post"
            class="flex gap-2 items-end"
            aria-label="메시지 전송">
        <label for="message-input" class="sr-only">메시지 입력</label>
        <textarea name="content"
                  id="message-input"
                  rows="1"
                  maxlength="1000"
                  placeholder="메시지를 입력하세요..."
                  required
                  aria-required="true"
                  class="flex-1 bg-slate-800 border border-slate-600/60 rounded-2xl px-4 py-2.5 text-sm text-white placeholder-slate-500 resize-none focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/40 transition-all duration-200 max-h-32 overflow-y-auto leading-relaxed"
        ></textarea>
        <button type="submit"
                aria-label="메시지 전송"
                class="w-10 h-10 bg-violet-600 hover:bg-violet-500 rounded-full flex items-center justify-center flex-shrink-0 transition-all duration-200 active:scale-90 hover:scale-105">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 rotate-90" aria-hidden="true">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
          </svg>
        </button>
      </form>
    </div>
  </div>

  <style>
    body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    main { flex: 1; overflow-y: auto; }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
  </style>

  <script th:inline="javascript">
    const matchId = /*[[${matchId}]]*/ null;
    const currentUserId = String(/*[[${currentUser != null ? currentUser.id : ''}]]*/ '');
    const partnerNick = /*[[${partnerNickname}]]*/ '?';

    const container = document.getElementById('messages-container');
    const input = document.getElementById('message-input');

    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      if (isNaN(date)) return '';
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return '방금 전';
      if (diff < 3600) return Math.floor(diff / 60) + '분 전';
      if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
      return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
    }

    function applyRelativeTimes() {
      document.querySelectorAll('time[data-time]').forEach(el => {
        el.textContent = relativeTime(el.getAttribute('data-time'));
      });
    }

    function scrollToBottom() {
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderMessage(msg) {
      const isMine = String(msg.sender?.id) === currentUserId;
      const row = document.createElement('div');
      row.setAttribute('data-msg-id', msg.id);
      row.className = 'flex items-end gap-2 message-row ' + (isMine ? 'justify-end' : 'justify-start');
      const initial = isMine ? '' : (partnerNick ? partnerNick.charAt(0) : '?');
      const bubbleCls = isMine
        ? 'bg-violet-600 text-white rounded-2xl rounded-br-md'
        : 'bg-slate-700 text-slate-100 rounded-2xl rounded-bl-md';
      const colAlign = isMine ? 'items-end' : 'items-start';
      row.innerHTML =
        (!isMine ? `<div class="w-7 h-7 bg-gradient-to-br from-violet-500 to-pink-500 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 mb-1">${escapeHtml(initial)}</div>` : '') +
        `<div class="flex flex-col gap-1 max-w-[75%] ${colAlign}">` +
          `<div class="px-4 py-2.5 text-sm leading-relaxed break-words shadow-sm ${bubbleCls}">${escapeHtml(msg.content)}</div>` +
          `<time class="text-slate-500 text-xs px-1">${relativeTime(msg.createdAt)}</time>` +
        `</div>` +
        (isMine ? '<div class="w-7 flex-shrink-0"></div>' : '');
      return row;
    }

    // Track known IDs
    const knownIds = new Set();
    document.querySelectorAll('[data-msg-id]').forEach(el => knownIds.add(el.getAttribute('data-msg-id')));

    async function pollMessages() {
      if (!matchId) return;
      try {
        const res = await fetch(`/chat/${matchId}/messages`, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) return;
        const messages = await res.json();
        let appended = false;
        messages.forEach(msg => {
          const id = String(msg.id);
          if (!knownIds.has(id)) {
            knownIds.add(id);
            container.appendChild(renderMessage(msg));
            appended = true;
          }
        });
        if (appended) scrollToBottom();
      } catch (e) { /* silent */ }
    }

    // Auto-grow textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 128) + 'px';
    });

    // Enter to send
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        input.closest('form').requestSubmit();
      }
    });

    applyRelativeTimes();
    scrollToBottom();
    setInterval(pollMessages, 3000);
  </script>

</body>
</html>
