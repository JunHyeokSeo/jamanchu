<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('취향 공유하기')}"></head>
<body class="bg-slate-900 text-white min-h-screen">

  <nav th:replace="~{fragments/layout :: nav}"></nav>

  <main class="max-w-lg mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-8">
      <a href="/feed" class="inline-flex items-center gap-2 text-slate-400 hover:text-white text-sm mb-4 transition-colors duration-200">
        ← 피드로 돌아가기
      </a>
      <h1 class="text-2xl font-bold text-white mb-1">취향 공유하기</h1>
      <p class="text-slate-400 text-sm">당신만의 취향을 익명으로 공유해보세요</p>
    </div>

    <form th:action="@{/posts}" method="post" class="flex flex-col gap-6" aria-label="취향 게시물 작성">

      <!-- Category selector -->
      <fieldset>
        <legend class="block text-sm font-semibold text-slate-300 mb-3">카테고리 선택</legend>
        <div class="flex flex-wrap gap-2" id="category-group" role="radiogroup" aria-required="true">
          <label th:each="cat : ${categories}" class="cursor-pointer">
            <input type="radio" name="category" th:value="${cat}" class="sr-only peer" required
                   th:attr="aria-label=${cat}" />
            <span th:text="${cat}"
                  class="inline-block px-4 py-2 rounded-full text-sm font-medium border border-slate-600 text-slate-300 bg-slate-800
                         peer-checked:bg-violet-600 peer-checked:border-violet-500 peer-checked:text-white
                         hover:border-violet-500/50 hover:text-violet-300 transition-all duration-200 select-none">
              카테고리
            </span>
          </label>
        </div>
      </fieldset>

      <!-- Category emoji map (visual enhancement) -->
      <div class="hidden" id="cat-emojis"
           data-음식="🍜" data-음악="🎵" data-영화="🎬" data-패션="👗" data-장소="📍" data-취미="🎮" data-기타="✨">
      </div>

      <!-- Content textarea -->
      <div>
        <label for="content" class="block text-sm font-semibold text-slate-300 mb-3">
          취향 이야기
        </label>
        <div class="relative">
          <textarea id="content"
                    name="content"
                    rows="6"
                    maxlength="500"
                    required
                    placeholder="당신의 취향을 자유롭게 적어보세요...&#10;&#10;예) 비오는 날 혼자 듣기 좋은 재즈가 있으면 추천해주세요 🎷"
                    class="w-full bg-slate-800/80 border border-slate-600/60 rounded-xl p-4 text-white text-base leading-relaxed placeholder-slate-500 resize-none focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/40 transition-all duration-200 scrollbar-hide"
          ></textarea>
          <div class="absolute bottom-3 right-3 text-slate-500 text-xs" id="char-count">0 / 500</div>
        </div>
      </div>

      <!-- Preview card (optional visual) -->
      <div id="preview-card" class="hidden bg-slate-800/40 border border-violet-500/30 rounded-xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-7 h-7 bg-gradient-to-br from-violet-500 to-pink-500 rounded-full flex items-center justify-center text-xs font-bold">
            나
          </div>
          <span class="text-slate-300 text-sm font-medium">미리보기</span>
          <span id="preview-cat" class="px-2 py-0.5 bg-slate-700 text-slate-300 text-xs rounded-full"></span>
        </div>
        <p id="preview-content" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap"></p>
      </div>

      <!-- Submit -->
      <button type="submit"
              class="w-full py-4 bg-gradient-to-r from-violet-600 to-pink-600 rounded-xl text-white font-bold text-base hover:opacity-90 active:scale-95 transition-all duration-200 shadow-lg shadow-violet-900/30 mt-2">
        공유하기 ✨
      </button>

    </form>
  </main>

  <footer th:replace="~{fragments/layout :: footer}"></footer>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script>
    const textarea = document.getElementById('content');
    const charCount = document.getElementById('char-count');
    const previewCard = document.getElementById('preview-card');
    const previewContent = document.getElementById('preview-content');
    const previewCat = document.getElementById('preview-cat');
    const catEmojis = document.getElementById('cat-emojis');

    textarea.addEventListener('input', () => {
      const len = textarea.value.length;
      charCount.textContent = len + ' / 500';
      charCount.className = 'absolute bottom-3 right-3 text-xs transition-colors duration-200 ' +
        (len > 450 ? 'text-pink-400' : 'text-slate-500');
      updatePreview();
    });

    document.querySelectorAll('input[name="category"]').forEach(radio => {
      radio.addEventListener('change', updatePreview);
    });

    function updatePreview() {
      const content = textarea.value.trim();
      const catRadio = document.querySelector('input[name="category"]:checked');
      if (content.length > 0 || catRadio) {
        previewCard.classList.remove('hidden');
        previewContent.textContent = content || '내용을 입력해주세요...';
        if (catRadio) {
          const emoji = catEmojis ? catEmojis.getAttribute('data-' + catRadio.value) || '' : '';
          previewCat.textContent = emoji + ' ' + catRadio.value;
        }
      } else {
        previewCard.classList.add('hidden');
      }
    }
  </script>

</body>
</html>
