<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${title} + ' | taste-match'">taste-match</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8B5CF6',
            accent: '#EC4899'
          },
          fontFamily: {
            sans: ['Pretendard', 'ui-sans-serif', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Pretendard', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Global mobile text overflow protection */
    * { box-sizing: border-box; }
    img { max-width: 100%; height: auto; }
    /* Consistent focus ring across all interactive elements */
    :focus-visible {
      outline: 2px solid #8B5CF6;
      outline-offset: 2px;
      border-radius: 6px;
    }
    /* Prevent horizontal scroll on mobile */
    body { overflow-x: hidden; }
  </style>
</head>

<nav th:fragment="nav" class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-700/50" aria-label="주 메뉴">
  <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
    <a href="/" aria-label="taste-match 홈으로 이동"
       class="text-xl font-bold bg-gradient-to-r from-violet-400 to-pink-400 bg-clip-text text-transparent tracking-tight hover:opacity-90 transition-opacity duration-200">
      taste-match
    </a>
    <div th:if="${currentUser != null}" class="flex items-center gap-1">
      <a href="/feed"
         aria-label="피드"
         class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700/60 transition-all duration-200">
        <span aria-hidden="true">🌿</span> 피드
      </a>
      <a href="/matches"
         aria-label="취향 매칭"
         class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700/60 transition-all duration-200">
        <span aria-hidden="true">💜</span> 매칭
      </a>
      <a href="/my"
         aria-label="마이페이지"
         class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700/60 transition-all duration-200">
        <span aria-hidden="true">👤</span> 마이페이지
      </a>
    </div>
  </div>
</nav>

<footer th:fragment="footer" class="mt-16 border-t border-slate-700/40 py-8 text-center">
  <p class="text-slate-500 text-sm">
    &copy; 2024 <span class="text-violet-400 font-medium">taste-match</span> &mdash; 취향으로 연결되는 익명의 공간
  </p>
</footer>
</html>
