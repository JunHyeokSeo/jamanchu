<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('마이페이지')}"></head>
<body class="bg-slate-900 text-white min-h-screen">

  <nav th:replace="~{fragments/layout :: nav}"></nav>

  <main class="max-w-2xl mx-auto px-4 py-8 pb-24">

    <!-- Profile card -->
    <div class="relative bg-slate-800/70 border border-slate-700/50 rounded-2xl p-6 mb-8 overflow-hidden">
      <!-- Background gradient -->
      <div class="absolute inset-0 bg-gradient-to-br from-violet-900/30 via-transparent to-pink-900/20 pointer-events-none"></div>

      <div class="relative flex items-start gap-4 sm:gap-5">
        <!-- Avatar -->
        <div class="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-br from-violet-500 to-pink-500 rounded-2xl flex items-center justify-center text-2xl font-extrabold flex-shrink-0 shadow-lg shadow-violet-900/40"
             th:text="${currentUser != null and currentUser.nickname != null ? currentUser.nickname.substring(0,1) : '?'}"
             aria-hidden="true">
          ?
        </div>

        <div class="flex-1 min-w-0">
          <h1 class="text-xl sm:text-2xl font-extrabold text-white mb-1 truncate"
              th:text="${currentUser != null ? currentUser.nickname : '알 수 없음'}">
            닉네임
          </h1>
          <p class="text-slate-400 text-sm mb-4">
            <span th:if="${currentUser != null and currentUser.createdAt != null}">
              <span th:text="${#temporals.format(currentUser.createdAt, 'yyyy년 MM월 dd일')}">가입일</span>에 참여했어요
            </span>
          </p>

          <!-- Stats row -->
          <div class="grid grid-cols-3 gap-2 sm:gap-3" role="list" aria-label="활동 통계">
            <div class="bg-slate-700/60 rounded-xl p-2.5 sm:p-3 text-center" role="listitem">
              <p class="text-violet-400 text-lg sm:text-xl font-extrabold"
                 th:text="${myPosts != null ? myPosts.size() : 0}"
                 aria-label="${myPosts != null ? myPosts.size() : 0} + '개 게시물'">0</p>
              <p class="text-slate-400 text-xs mt-0.5">게시물</p>
            </div>
            <div class="bg-slate-700/60 rounded-xl p-2.5 sm:p-3 text-center" role="listitem">
              <p class="text-pink-400 text-lg sm:text-xl font-extrabold" th:text="${totalReactions}">0</p>
              <p class="text-slate-400 text-xs mt-0.5">받은 반응</p>
            </div>
            <div class="bg-slate-700/60 rounded-xl p-2.5 sm:p-3 text-center" role="listitem">
              <p class="text-violet-400 text-lg sm:text-xl font-extrabold" th:text="${matchCount}">0</p>
              <p class="text-slate-400 text-xs mt-0.5">매칭</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- My posts section -->
    <div class="mb-6">
      <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
        <span>✍️</span>
        <span>내 취향 게시물</span>
        <span class="text-slate-500 text-sm font-normal"
              th:text="'(' + (${myPosts != null ? myPosts.size() : 0}) + ')'">
          (0)
        </span>
      </h2>

      <!-- Empty my posts -->
      <div th:if="${myPosts == null or myPosts.isEmpty()}"
           class="text-center py-12 bg-slate-800/40 border border-slate-700/40 rounded-2xl">
        <div class="text-4xl mb-3">📝</div>
        <p class="text-slate-400 text-sm">아직 공유한 취향이 없어요</p>
      </div>

      <!-- Post cards (no reaction buttons) -->
      <div class="flex flex-col gap-3">
        <article th:each="post : ${myPosts}"
                 class="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-5 hover:border-slate-600/60 hover:bg-slate-800/80 transition-all duration-200">

          <!-- Card header -->
          <div class="flex items-center gap-2 mb-3">
            <span class="px-2.5 py-0.5 bg-violet-900/50 border border-violet-500/30 text-violet-300 text-xs rounded-full font-medium"
                  th:text="${post.category}">
              카테고리
            </span>
            <time class="text-slate-500 text-xs ml-auto"
                  th:attr="data-time=${post.createdAt}">
            </time>
          </div>

          <!-- Content -->
          <p class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap mb-3"
             th:text="${post.content}">
            게시물 내용
          </p>

          <!-- Reaction summary -->
          <div class="flex items-center gap-2 sm:gap-3 pt-2 border-t border-slate-700/40 flex-wrap">
            <span class="text-slate-500 text-xs">반응</span>
            <span class="flex items-center gap-1 text-xs text-slate-400">
              <span aria-hidden="true">👍</span>
              <span th:text="${post.reactions != null and post.reactions['LIKE'] != null ? post.reactions['LIKE'] : 0}">0</span>
            </span>
            <span class="flex items-center gap-1 text-xs text-slate-400">
              <span aria-hidden="true">💜</span>
              <span th:text="${post.reactions != null and post.reactions['EMPATHY'] != null ? post.reactions['EMPATHY'] : 0}">0</span>
            </span>
            <span class="flex items-center gap-1 text-xs text-slate-400">
              <span aria-hidden="true">🙋</span>
              <span th:text="${post.reactions != null and post.reactions['SAME_HERE'] != null ? post.reactions['SAME_HERE'] : 0}">0</span>
            </span>
            <span class="flex items-center gap-1 text-xs text-slate-400">
              <span aria-hidden="true">🤔</span>
              <span th:text="${post.reactions != null and post.reactions['CURIOUS'] != null ? post.reactions['CURIOUS'] : 0}">0</span>
            </span>
            <span class="ml-auto text-xs text-slate-500">
              총 <span th:text="${post.reactionCount}" class="text-violet-400 font-bold">0</span>개
            </span>
          </div>

        </article>
      </div>
    </div>

    <!-- New post CTA -->
    <div class="text-center">
      <a href="/posts/new"
         class="inline-flex items-center gap-2 px-8 py-3.5 bg-gradient-to-r from-violet-600 to-pink-600 rounded-xl font-bold text-sm text-white hover:opacity-90 active:scale-95 transition-all duration-200 shadow-lg shadow-violet-900/30">
        <span>✨</span>
        <span>새 취향 공유하기</span>
      </a>
    </div>

  </main>

  <footer th:replace="~{fragments/layout :: footer}"></footer>

  <script>
    function relativeTime(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      if (isNaN(date)) return '';
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return '방금 전';
      if (diff < 3600) return Math.floor(diff / 60) + '분 전';
      if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
      if (diff < 2592000) return Math.floor(diff / 86400) + '일 전';
      return date.toLocaleDateString('ko-KR');
    }
    document.querySelectorAll('time[data-time]').forEach(el => {
      el.textContent = relativeTime(el.getAttribute('data-time'));
    });
  </script>

</body>
</html>
