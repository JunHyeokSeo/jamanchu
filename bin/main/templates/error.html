<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('오류')}"></head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

  <nav th:replace="~{fragments/layout :: nav}"></nav>

  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="text-center max-w-md w-full">

      <!-- Dynamic emoji based on status code -->
      <div class="text-7xl mb-6 select-none" aria-hidden="true"
           th:with="emoji=${status == 404 ? '🔍' : status == 403 ? '🚫' : status == 500 ? '💥' : status == 503 ? '🛠️' : '⚠️'}">
        <span th:text="${emoji}">⚠️</span>
      </div>

      <!-- Status code badge -->
      <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-slate-800 border border-slate-700/60 rounded-full mb-4">
        <span class="w-2 h-2 rounded-full bg-pink-500 animate-pulse" aria-hidden="true"></span>
        <span class="text-slate-400 text-sm font-mono font-semibold"
              th:text="${status != null ? status : 'ERROR'}">ERROR</span>
      </div>

      <!-- Title -->
      <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-3 tracking-tight"
          th:with="title=${status == 404 ? '페이지를 찾을 수 없어요' : status == 403 ? '접근 권한이 없어요' : status == 500 ? '서버에서 문제가 발생했어요' : status == 503 ? '서비스가 잠시 중단됐어요' : '오류가 발생했어요'}"
          th:text="${title}">오류가 발생했어요</h1>

      <!-- Error message -->
      <p class="text-slate-400 text-base leading-relaxed mb-8"
         th:text="${message != null and !#strings.isEmpty(message) ? message : '잠시 후 다시 시도해주세요.'}">
        잠시 후 다시 시도해주세요.
      </p>

      <!-- Action buttons -->
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="/"
           class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-violet-600 hover:bg-violet-500 active:scale-95 rounded-xl font-semibold text-sm text-white transition-all duration-200 shadow-lg shadow-violet-900/30">
          <span aria-hidden="true">🏠</span>
          <span>홈으로 돌아가기</span>
        </a>
        <button type="button"
                onclick="history.back()"
                class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-slate-800 hover:bg-slate-700 active:scale-95 border border-slate-700/60 rounded-xl font-semibold text-sm text-slate-300 hover:text-white transition-all duration-200">
          <span aria-hidden="true">←</span>
          <span>이전 페이지</span>
        </button>
      </div>

      <!-- Decorative background blobs -->
      <div class="absolute inset-0 pointer-events-none overflow-hidden -z-10" aria-hidden="true">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-violet-600/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-pink-600/10 rounded-full blur-3xl"></div>
      </div>

    </div>
  </main>

  <footer th:replace="~{fragments/layout :: footer}"></footer>

  <style>
    main { position: relative; }
  </style>

</body>
</html>
